<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MonkeyQuest</title>
    <link rel="stylesheet" href="style_2.css">
</head>
<body>
    <div class="container">
        <div class="maze-container">
            <div class="maze-card">
                <canvas id="maze"></canvas>
            </div>
            <div class="chat-box-container">
                <div class="chat">
                     <div class="message-from-monkey">
                        <img src="img/monkeychat.png" alt="" id="levelImg">
                        <p class="level-display">level 1</p>
                     </div>
                     <div class="chat-monkey" id="question">
                        <div class="loader"></div>
                     </div>
                </div>
                
                <form action="" method="post" class="message" id="banana_question_form">
                    <div class="text-in"><input type="text" name="msg" id="msg"><img src="img/cute.png" alt="" srcset="" id="profile-image"></div>
                    <button id="send-btn"><img src="img/send_50dp_071E07_FILL0_wght400_GRAD0_opsz48.svg" alt="" srcset=""></button>
                </form>

            </div>
        </div>
        <div class="score-card">
            <div id="level-display">LVL1</div>

            <div id="score-display">Score:100<div class="adding"></div></div>

            <div id="profile"></div>

            <div id="unloack">Goal:</div>
            <div class="keypads">
                <div>
                    <button id="up">↑</button>
                </div>
                <div>
                <button id="left">←</button>
                <button id="down">↓</button>
                <button id="right">→</button>
                </div>
            </div>

            <div class="logout-section"> 
            <button class="Btn">
                <div class="sign">
                    <svg viewBox="0 0 512 512">
                    <path
                        d="M377.9 105.9L500.7 228.7c7.2 7.2 11.3 17.1 11.3 27.3s-4.1 20.1-11.3 27.3L377.9 406.1c-6.4 6.4-15 9.9-24 9.9c-18.7 0-33.9-15.2-33.9-33.9l0-62.1-128 0c-17.7 0-32-14.3-32-32l0-64c0-17.7 14.3-32 32-32l128 0 0-62.1c0-18.7 15.2-33.9 33.9-33.9c9 0 17.6 3.6 24 9.9zM160 96L96 96c-17.7 0-32 14.3-32 32l0 256c0 17.7 14.3 32 32 32l64 0c17.7 0 32 14.3 32 32s-14.3 32-32 32l-64 0c-53 0-96-43-96-96L0 128C0 75 43 32 96 32l64 0c17.7 0 32 14.3 32 32s-14.3 32-32 32z"
                    ></path>
                    </svg>
                </div>
                <div class="text">Logout</div>
            </button>
            </div>

        </div>
    </div>
</body>
<script src="/BackEnd/game.js"></script>
<script src="/BackEnd/player.js"></script>
<script src="/BackEnd/User.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {

        let user = User.load();

        if(!user){
            window.location.href = "index.html";
            return;
        }

        user.playerInit_level();
        user.gameLoop();
        updateDashBoardDisplay();
    });


    document.addEventListener("keydown", function(e){

    let keyMap = {
        ArrowUp: "up",
        ArrowDown: "down",
        ArrowLeft: "left",
        ArrowRight: "right"
    };

    if(keyMap[e.key]){
        let btn = document.getElementById(keyMap[e.key]);

        btn.classList.add("active");

        setTimeout(()=>{
            btn.classList.remove("active");
        },120);
    }
    });
    console.log(user.coins);
    
    function updateDashBoardDisplay(){
        document.getElementById("level-display").textContent = `LVL ${user.level}`;
        document.getElementById("score-display").textContent = `Score: ${user.coins}`;
        document.getElementById("profile").textContent = `${user.name}`;
        const img = document.getElementById("levelImg");
        img.src = user.levelsBoard[user.level].profile;
        
        document.querySelector(".level-display").textContent = `Level ${user.level}`;
        document.getElementById("unloack").textContent = `Goal: ${user.levelsBoard[user.level].goal}`;
        
    }

    document.addEventListener("DOMContentLoaded", updateDashBoardDisplay);


    function showLevelUpOverlay() {
        const overlay = document.createElement("div");
        overlay.classList.add("LevelUP_overlay");

        overlay.innerHTML = `
            <img src="${user.levelsBoard[user.level].profile}" alt="profile" class="profile-mon">
            <h1>Level Up!</h1>
            <h2>Score: ${user.coins}</h2>
            <button id="closeLevelUp">OK</button>
        `;

        document.body.appendChild(overlay);

        document.getElementById("closeLevelUp").addEventListener("click", () => {
            overlay.remove(); 
        });
}
</script>

</html>

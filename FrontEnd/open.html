<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monkey Quest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Afacad+Flux:wght@100..1000&family=Arizonia&family=Bad+Script&family=Barlow:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Bellefair&family=Benne&family=Edu+AU+VIC+WA+NT+Pre:wght@400..700&family=Faculty+Glyphic&family=Geist:wght@100..900&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Itim&family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Lancelot&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Pixelify+Sans:wght@400..700&family=Playwrite+GB+S:ital,wght@0,100..400;1,100..400&family=Poiret+One&family=Raleway:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="open.css">
</head>
<body>
    <div class="container_large">
        <div class="container_menu">
            <div class="logo">
                <img src="img/logo.png" alt="" srcset="" id="logo_img">
            </div>
            <div class="dashboard">
                <button id="play" class="dashbtn">Play</button>
                <button id="option" class="dashbtn">option</button>
                <button id="quit" class="dashbtn">quit</button>
            </div>
        </div>
        <div class="container_image"></div>


        <div class="popup_login">
                <div class="popup_login_container">
                    <h2>Login</h2>
                    <input type="text" placeholder="Username" id="username">
                    <button id="login_btn">Login</button>
                </div>
        </div>
    </div>

    <script>
const popup = document.querySelector('.popup_login');
const playBtn = document.getElementById('play');
const loginBtn = document.getElementById('login_btn');

popup.style.display = 'none';

// When page loads
window.onload = function () {
    const currentUser = sessionStorage.getItem("currentUser");

    if (currentUser) {
        startGame(currentUser);
    }
};

// When Play clicked
playBtn.addEventListener('click', function () {
    const currentUser = sessionStorage.getItem("currentUser");

    if (currentUser) {
        startGame(currentUser);
    } else {
        popup.style.display = "flex";
    }
});

// When Start button clicked
loginBtn.addEventListener('click', function () {
    const username = document.getElementById('username').value.trim();

    if (!username) {
        alert("Please enter your name");
        return;
    }

    // Save session
    sessionStorage.setItem("currentUser", username);

    // If new user, set level 1
    if (!localStorage.getItem(username + "_level")) {
        localStorage.setItem(username + "_level", 1);
    }

    popup.style.display = "none";
    startGame(username);
});

// Start Game
function startGame(username) {
    const level = localStorage.getItem(username + "_level");
    alert("Welcome " + username + " | Level: " + level);

    // Redirect to game page if needed
    // window.location.href = "game.html";
}

// Level Up Function
function levelUp() {
    const username = sessionStorage.getItem("currentUser");
    if (!username) return;

    let level = parseInt(localStorage.getItem(username + "_level"));
    level++;

    localStorage.setItem(username + "_level", level);

    console.log("Level increased to:", level);
}

// Logout (optional)
function logout() {
    sessionStorage.removeItem("currentUser");
    location.reload();
}
    </script>
</body>
</html>

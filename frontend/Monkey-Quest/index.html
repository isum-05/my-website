<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MonkeyQuest</title>
    <link rel="shortcut icon" href="img/Favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="./src/style_1.css">
</head>
<body>
    <div class="container">
        <div class="left-section">
            <div class="logo-image">
                <img src="/img/logo2.png" alt="MonkeyQuest Logo">
            </div>
            <div class="popup-section"></div>
        </div>
        <div class="right-section">
            <div class="Monkey-message-section">
                <div class="text-box" id="monkeyText">
                </div>
            </div>
            <div class="play-dashboard">
                <button class="play" id="start-btn"><img src="/img/playImg.png" alt="play"></button>
            </div>
        </div>
        <div class="login" id="loginBox">
            <button class="close-btn" id="close-login">✖</button>

            <div class="image-cute">
                <img src="/login-img.png" alt="image-cute" srcset="" id="login-image-cute">
            </div>
            <h1>Welcome to MonkeyQuest</h1>
            <p>Sign in with GitHub for full features
            or continue as a local player</p>
            <div class="login-bottom">
                <div> 
                    <input type="text" id="name" placeholder="Name">
                    <div class="authenticate-section">
                        <p>Continue with</p>
                        <button class="link-btn" id="github-btn" >GitHub</button>
                    </div>
                </div>        
                <button id="login-btn" > Login</button>
            </div>
        </div>  
    </div>
 
</body>
<script>
const textBox = document.getElementById("monkeyText");
textBox.innerHTML = "Thinking...";
async function monkeySpeak() {
    try {
        const res = await fetch("https://icanhazdadjoke.com/", {
            headers: { Accept: "application/json" }
        });
        const data = await res.json();

        textBox.style.opacity = 0;
        textBox.style.transform = "scale(0.95)";

        setTimeout(() => {
            textBox.innerText = data.joke;
            textBox.style.transform = "scale(1)";
            textBox.style.opacity = 1;
        }, 300);
    } catch {
        textBox.innerText = "Oops!";
    }
}

monkeySpeak();
setInterval(monkeySpeak, 5000);

const loginBox = document.getElementById("loginBox");
const loginBtn = document.getElementById("login-btn");
const closeLoginBtn = document.getElementById("close-login");
const startBtn = document.getElementById("start-btn");
const githubBtn = document.getElementById("github-btn");

function isLogged() {
    const user = localStorage.getItem("User");
    const session = sessionStorage.getItem("ActiveSession");

    if (user && session) {
        window.location.href = "game.html";
        return true;
    } else {
        loginBox.style.display = "flex";
        return false;
    }
}

function closeLogin() {
    loginBox.style.display = "none";
}

loginBtn.addEventListener("click", () => {
    const nameInput = document.getElementById("name").value.trim();

    if (nameInput === "") {
        alert("Please enter your name to continue!");
        return;
    }

    localStorage.setItem("User", JSON.stringify({
            name: nameInput,
            level: this.level,
            coins: this.coins
    }));
    sessionStorage.setItem("ActiveSession", "true");
    console.log("Local user saved to localStorage");

    window.location.href = "game.html";
});

closeLoginBtn.addEventListener("click", closeLogin);

startBtn.addEventListener("click", () => {
    isLogged();
});

githubBtn.addEventListener("click", () => {
    window.location.href = "http://localhost:4000/app/v1/users/auth/github";
});
</script>
</html>
